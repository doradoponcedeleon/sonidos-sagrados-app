<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generador de Sonido</title>
  <style>
    :root {
      --bg: #0f141b;
      --panel: #141b24;
      --ink: #e7edf5;
      --muted: #98a6b9;
      --accent: #35d0ff;
      --accent-2: #8cffc1;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(53, 208, 255, 0.25), transparent 60%),
                  radial-gradient(900px 900px at 110% 20%, rgba(140, 255, 193, 0.2), transparent 60%),
                  var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 18px;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 22px;
      grid-template-columns: minmax(260px, 340px) 1fr;
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 16px;
      letter-spacing: 0.02em;
    }

    .control {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .control label {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 110px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn.active {
      background: linear-gradient(135deg, rgba(53, 208, 255, 0.25), rgba(140, 255, 193, 0.2));
      border-color: rgba(53, 208, 255, 0.6);
      color: white;
    }

    .btn:hover { transform: translateY(-1px); }

    .cta {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .cta button {
      flex: 1;
      border-radius: 14px;
      padding: 12px 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .start {
      background: var(--accent);
      color: #0c1218;
    }

    .stop {
      background: rgba(255,255,255,0.06);
      color: var(--danger);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .display {
      display: grid;
      gap: 14px;
    }

    .readout {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(2, minmax(140px, 1fr));
      font-size: 0.9rem;
      color: var(--muted);
    }

    .readout span {
      color: var(--ink);
      font-weight: 600;
    }

    canvas {
      width: 100%;
      height: 340px;
      background: rgba(7, 12, 18, 0.7);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>Generador de sonido</h1>

      <div class="control">
        <label>Tipo de onda</label>
        <div class="row" id="wave-buttons">
          <button class="btn active" data-wave="sine">Seno</button>
          <button class="btn" data-wave="square">Cuadrada</button>
          <button class="btn" data-wave="triangle">Triangular</button>
          <button class="btn" data-wave="sawtooth">Diente de sierra</button>
        </div>
      </div>

      <div class="control">
        <label>Amplitud (volumen): <span id="amp-value">0.5</span></label>
        <input id="amp" type="range" min="0" max="1" step="0.01" value="0.5" />
      </div>

      <div class="control">
        <label>Frecuencia (Hz): <span id="freq-value">220</span></label>
        <input id="freq" type="range" min="40" max="2000" step="1" value="220" />
      </div>

      <div class="control">
        <label>Armónicos: <span id="harm-value">4</span></label>
        <input id="harm" type="range" min="1" max="12" step="1" value="4" />
      </div>

      <div class="cta">
        <button class="start" id="start">Reproducir</button>
        <button class="stop" id="stop">Detener</button>
      </div>

      <p class="hint">Tip: sube los armónicos para enriquecer el timbre. Usa el espectro triangular para sonidos suaves.</p>
    </section>

    <section class="panel display">
      <div class="readout">
        <div>Onda: <span id="read-wave">Seno</span></div>
        <div>Estado: <span id="read-state">Silencio</span></div>
        <div>Frecuencia: <span id="read-freq">220 Hz</span></div>
        <div>Armónicos: <span id="read-harm">4</span></div>
      </div>
      <canvas id="scope" width="900" height="340"></canvas>
      <p class="hint">La gráfica muestra la forma de onda resultante (fundamental + armónicos).</p>
    </section>
  </main>

  <script>
    const audioState = {
      ctx: null,
      osc: null,
      gain: null,
      running: false,
      wave: "sine"
    };

    const ui = {
      amp: document.getElementById("amp"),
      freq: document.getElementById("freq"),
      harm: document.getElementById("harm"),
      ampValue: document.getElementById("amp-value"),
      freqValue: document.getElementById("freq-value"),
      harmValue: document.getElementById("harm-value"),
      readWave: document.getElementById("read-wave"),
      readState: document.getElementById("read-state"),
      readFreq: document.getElementById("read-freq"),
      readHarm: document.getElementById("read-harm"),
      buttons: Array.from(document.querySelectorAll("#wave-buttons .btn")),
      start: document.getElementById("start"),
      stop: document.getElementById("stop"),
      canvas: document.getElementById("scope")
    };

    const waveLabels = {
      sine: "Seno",
      square: "Cuadrada",
      triangle: "Triangular",
      sawtooth: "Diente de sierra"
    };

    function ensureAudio() {
      if (!audioState.ctx) {
        audioState.ctx = new (window.AudioContext || window.webkitAudioContext)();
        audioState.gain = audioState.ctx.createGain();
        audioState.gain.connect(audioState.ctx.destination);
      }
    }

    function updateWave() {
      if (!audioState.osc) return;
      const harmonics = parseInt(ui.harm.value, 10);
      if (audioState.wave === "sine") {
        audioState.osc.type = "sine";
      } else {
        const real = new Float32Array(harmonics + 1);
        const imag = new Float32Array(harmonics + 1);

        for (let n = 1; n <= harmonics; n++) {
          let amp = 0;
          switch (audioState.wave) {
            case "square":
              amp = n % 2 === 1 ? 1 / n : 0;
              break;
            case "triangle":
              amp = n % 2 === 1 ? 1 / (n * n) : 0;
              break;
            case "sawtooth":
              amp = 1 / n;
              break;
          }
          real[n] = 0;
          imag[n] = amp;
        }
        const wave = audioState.ctx.createPeriodicWave(real, imag, { disableNormalization: true });
        audioState.osc.setPeriodicWave(wave);
      }
      ui.readWave.textContent = waveLabels[audioState.wave];
    }

    function updateParams() {
      const amp = parseFloat(ui.amp.value);
      const freq = parseFloat(ui.freq.value);
      const harm = parseInt(ui.harm.value, 10);

      ui.ampValue.textContent = amp.toFixed(2);
      ui.freqValue.textContent = freq.toFixed(0);
      ui.harmValue.textContent = harm;

      ui.readFreq.textContent = `${freq.toFixed(0)} Hz`;
      ui.readHarm.textContent = harm;

      if (audioState.gain) {
        audioState.gain.gain.setTargetAtTime(amp, audioState.ctx.currentTime, 0.02);
      }
      if (audioState.osc) {
        audioState.osc.frequency.setTargetAtTime(freq, audioState.ctx.currentTime, 0.02);
      }
      drawWaveform();
    }

    function startSound() {
      ensureAudio();
      if (audioState.running) return;

      audioState.osc = audioState.ctx.createOscillator();
      audioState.osc.connect(audioState.gain);
      audioState.osc.frequency.value = parseFloat(ui.freq.value);
      audioState.gain.gain.value = parseFloat(ui.amp.value);
      updateWave();

      audioState.osc.start();
      audioState.running = true;
      ui.readState.textContent = "Reproduciendo";
    }

    function stopSound() {
      if (!audioState.running) return;
      audioState.osc.stop();
      audioState.osc.disconnect();
      audioState.osc = null;
      audioState.running = false;
      ui.readState.textContent = "Silencio";
    }

    function drawWaveform() {
      const canvas = ui.canvas;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "rgba(7, 12, 18, 0.6)";
      ctx.fillRect(0, 0, w, h);

      const mid = h / 2;
      ctx.strokeStyle = "rgba(53, 208, 255, 0.8)";
      ctx.lineWidth = 2.2;

      const samples = 512;
      const amp = parseFloat(ui.amp.value);
      const freq = parseFloat(ui.freq.value);
      const harmonics = parseInt(ui.harm.value, 10);

      ctx.beginPath();
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const phase = t * 2 * Math.PI;
        let value = 0;

        if (audioState.wave === "sine") {
          value = Math.sin(phase);
        } else if (audioState.wave === "square") {
          for (let n = 1; n <= harmonics; n += 2) {
            value += Math.sin(n * phase) / n;
          }
        } else if (audioState.wave === "triangle") {
          let sign = 1;
          for (let n = 1; n <= harmonics; n += 2) {
            value += sign * Math.sin(n * phase) / (n * n);
            sign *= -1;
          }
        } else if (audioState.wave === "sawtooth") {
          for (let n = 1; n <= harmonics; n++) {
            value += Math.sin(n * phase) / n;
          }
        }

        value = value * amp;
        const x = (i / samples) * w;
        const y = mid - value * (h * 0.35);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.strokeStyle = "rgba(140, 255, 193, 0.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, mid);
      ctx.lineTo(w, mid);
      ctx.stroke();
    }

    ui.buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        ui.buttons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        audioState.wave = btn.dataset.wave;
        updateWave();
        drawWaveform();
      });
    });

    ui.amp.addEventListener("input", updateParams);
    ui.freq.addEventListener("input", updateParams);
    ui.harm.addEventListener("input", () => {
      updateParams();
      updateWave();
    });

    ui.start.addEventListener("click", () => {
      startSound();
      updateParams();
    });

    ui.stop.addEventListener("click", stopSound);

    drawWaveform();
  </script>

  <div style="text-align:center; margin: 24px 0;">
    <a href="sonidos_sagrados.html" style="color:#35d0ff; text-decoration:none; font-weight:600;">Ir a Sonidos Sagrados</a>
  </div>
</body>
</html>
