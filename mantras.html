<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mantras — Generador de Sonidos Sagrados</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Mantras</h1>
    <p class="sub">Generador web (offline) — dron + binaural + guía por sílabas</p>
    <p class="sub"><a href="sonidos_sagrados.html" style="color:#9bb7ff; text-decoration:none;">Volver a Sonidos Sagrados</a></p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Biblioteca</h2>

      <div class="row">
        <label>Buscar</label>
        <input id="q" placeholder="OM, Gayatri, compasión..." />
      </div>

      <div class="row two">
        <div>
          <label>Modo</label>
          <select id="modo">
            <option value="">(Todos)</option>
            <option value="meditacion_profunda">Meditación profunda</option>
            <option value="enfoque">Enfoque</option>
            <option value="compasion">Compasión</option>
            <option value="proteccion">Protección</option>
            <option value="purificacion">Purificación</option>
            <option value="gratitud">Gratitud</option>
            <option value="sueno">Sueño</option>
            <option value="energia">Energía</option>
          </select>
        </div>

        <div>
          <label>Categoría</label>
          <select id="cat">
            <option value="">(Todas)</option>
            <option value="grave">Grave</option>
            <option value="media">Media</option>
            <option value="aguda">Aguda</option>
          </select>
        </div>
      </div>

      <div id="list" class="list"></div>
    </section>

    <section class="card">
      <h2>Reproductor</h2>

      <div id="now" class="now">Selecciona un mantra…</div>

      <div class="row two">
        <div>
          <label>Dron (Hz)</label>
          <input id="dronHz" type="number" step="0.01" min="20" max="500" value="136.10" />
        </div>
        <div>
          <label>BPM</label>
          <input id="bpm" type="number" step="1" min="10" max="180" value="42" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label>Volumen dron</label>
          <input id="dronVol" type="range" min="0" max="2" step="0.01" value="0.85" />
        </div>
        <div>
          <label>Volumen guía</label>
          <input id="pulseVol" type="range" min="0" max="2" step="0.01" value="0.55" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label>Espectro armónico: <span id="harmSpecVal">3</span></label>
          <input id="harmSpec" type="range" min="1" max="5" step="1" value="3" />
        </div>
        <div>
          <label>Resonancia corporal: <span id="bodyResVal">3</span></label>
          <input id="bodyRes" type="range" min="1" max="5" step="1" value="3" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label>Envolvente temporal: <span id="timeEnvVal">3</span></label>
          <input id="timeEnv" type="range" min="1" max="5" step="1" value="3" />
        </div>
        <div>
          <label>Posición articulatoria: <span id="articulVal">3</span></label>
          <input id="articul" type="range" min="1" max="5" step="1" value="3" />
        </div>
      </div>

      <div class="row two">
        <div>
          <label><input id="binauralOn" type="checkbox" checked /> Binaural</label>
          <div class="hint">Usa audífonos para sentirlo.</div>
        </div>
        <div>
          <label>Δ binaural (Hz)</label>
          <input id="delta" type="number" step="0.1" min="0" max="40" value="6.0" />
        </div>
      </div>

      <div class="row two">
        <button id="play" class="primary">▶ Iniciar</button>
        <button id="stop" class="danger" disabled>■ Detener</button>
      </div>

      <div class="syllables">
        <div class="label">Sílabas</div>
        <div id="syll" class="chips"></div>
      </div>

      <div class="footerNote">
        Si el audio no arranca: toca “Iniciar” otra vez (Android a veces bloquea la primera activación).
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
